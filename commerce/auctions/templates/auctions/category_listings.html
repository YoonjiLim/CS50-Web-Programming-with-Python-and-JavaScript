{% extends "auctions/layout.html" %}

{% block body %}

<div class="container mt-4">
    <h2>{{ category.name }}</h2>

    <div class="row">
        {% for listing in listings %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">
            {% include "auctions/_listing_card.html" %} 
        </div>
        {% empty %}
        <div class="col-12">
            <p>No active listings in this category.</p>
        </div>
        {% endfor %}
    </div>
</div>

{% endblock %}
